# Node API + Nginx（接口文档）
# 使用：在 intelligent-community-admin 目录下
#   docker compose -f deploy/docker-compose.api-docs.yml up -d --build
#
# 访问：
#   文档：http://服务器IP:8088/
#   直连 API（可选）：http://服务器IP:3000/api/health
#
# 请先准备同目录可读的 .env（或 export 后改用 env_file 指向绝对路径）

services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: ic-admin-api
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "3000:3000"
    # 与宿主机上的 MySQL 通信：Docker 默认用 bridge 时可用：
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # 若 DATABASE_URL 里是 127.0.0.1，请改为 host.docker.internal，例如：
    # mysql://user:pass@host.docker.internal:3306/ic_test?charset=utf8mb4

  docs:
    build:
      context: ./nginx-docs
      dockerfile: Dockerfile
    container_name: ic-admin-docs
    restart: unless-stopped
    ports:
      - "8088:80"
    depends_on:
      - api
